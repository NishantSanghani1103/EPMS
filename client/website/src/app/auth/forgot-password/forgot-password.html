<div class="auth-wrapper">
  <div class="container">
    <div class="row justify-content-center align-items-center min-vh-100">
      <div class="col-lg-5 col-md-7">
        <div class="card auth-card border-0">
          <div class="card-body">
            <!-- Logo -->

            <div class="text-center mb-4">
              <div class="logo-circle">
                <i class="bi bi-kanban-fill"></i>
              </div>

              <h2 class="fw-bold mt-3">Forgot Password?</h2>

              <p class="text-muted">
                Enter your registered email address and we'll send you instructions to reset your
                password.
              </p>
            </div>

            <!-- Form -->

            <form (submit)="forgotPassword()" [formGroup]="forgotForm" >
              <div class="mb-4">
                <label class="form-label"> Email Address </label>

                <div class="input-group">
       

                  <input type="email" formControlName="email" class="form-control" placeholder="Enter your email" />

                </div>
                <app-form-validation [control]="f['email']" label="email"></app-form-validation>
              </div>

              <div class="mb-4">
                <label class="form-label"> Password </label>

                <div class="input-group">
             

                  <input type="password" class="form-control"  formControlName="password" placeholder="Enter Password" />
                </div>
                <app-form-validation [control]="f['password']" label="password"></app-form-validation>
              </div>

              <div class="mb-4">
                <label class="form-label"> Correct Password </label>

                <div class="input-group">
           
                  <input type="password" class="form-control"  formControlName="confirmPassword" placeholder="Enter Correct Password" />
                </div>
                <app-form-validation [control]="f['confirmPassword']" label="confirmPassword"></app-form-validation>
              </div>

              <button type="submit" [disabled]="forgotForm.invalid" class="btn btn-primary w-100">Change Password</button>
            </form>

            <hr class="my-4" />

            <div class="text-center">
              <a href="#" class="text-decoration-none">
                <i class="bi bi-arrow-left me-2"></i>

                Back to Login
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
