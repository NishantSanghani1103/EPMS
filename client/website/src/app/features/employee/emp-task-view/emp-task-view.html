<div class="container-fluid py-4">
  <!-- Page Header -->

  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h3 class="fw-bold mb-1">My Tasks</h3>

      <p class="text-muted mb-0">View and manage all your assigned tasks.</p>
    </div>
  </div>

  <!-- Statistics -->

  <!-- Filters -->

  <div class="card border-0 shadow-sm mb-4">
    <div class="card-body">
      <div class="row g-3">
        <div class="col-lg-4">
          <div class="input-group">
            <span class="input-group-text">
              <i class="bi bi-search"></i>
            </span>

            <input type="text" class="form-control" placeholder="Search task..." />
          </div>
        </div>

        <div class="col-lg-3">
          <select class="form-select">
            <option>Status</option>

            <option>Pending</option>

            <option>In Progress</option>

            <option>Completed</option>
          </select>
        </div>

        <div class="col-lg-3">
          <select class="form-select">
            <option>Priority</option>

            <option>High</option>

            <option>Medium</option>

            <option>Low</option>
          </select>
        </div>

        <div class="col-lg-2">
          <button class="btn btn-primary w-100">Filter</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Table -->

  <div class="card border-0 shadow-sm">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
          <tr>
            <th>#</th>

            <th>Task</th>

            <th>Project</th>

            <th>Priority</th>

            <th>Status</th>

            <th>Due Date</th>

            <th>Action</th>
          </tr>
        </thead>

        <tbody>
          @for (item of taskData(); track item) {
            <tr>
              <td>1</td>

              <td>
                <strong class="text-capitalize">{{item.title}}</strong>

              
              </td>

              <td>{{item.project.name}}</td>

              <td>
                <span class="badge bg-dark text-capitalize"> {{item.priority}} </span>
              </td>

              <td>
                <span class="badge bg-warning text-dark text-capitalize"> {{item.status}} </span>
              </td>

              <td>{{item.dueDate | date}} </td>

              <td>
                <button class="btn btn-sm btn-primary">
                  <i class="bi bi-eye"></i>

                  View
                </button>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>

    <div class="card-footer bg-white">
      <nav>
        <ul class="pagination justify-content-end mb-0">
          <li class="page-item disabled">
            <a class="page-link">Previous</a>
          </li>

          <li class="page-item active">
            <a class="page-link">1</a>
          </li>

          <li class="page-item">
            <a class="page-link">2</a>
          </li>

          <li class="page-item">
            <a class="page-link">Next</a>
          </li>
        </ul>
      </nav>
    </div>
  </div>
</div>
