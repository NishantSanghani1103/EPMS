<div class="container-fluid py-4">
  <div class="mb-4">
    <h2 class="fw-bold">Add Project</h2>

    <p class="text-muted">Create a new project and assign a project manager.</p>
  </div>

  <div class="row justify-content-center">
    <div class="col-lg-9">
      <div class="card shadow-sm border-0">
        <div class="card-body p-4">
          <div class="row g-4">
            <div class="col-md-6">
              <label class="form-label"> Project Name </label>

              <input class="form-control" placeholder="ERP System" />
            </div>

            <div class="col-md-6">
              <label class="form-label"> Department </label>

              <select class="form-select">
                @for (item of deptData(); track item.id) {
                  <option [value]="item.id">{{ item.name }}</option>
                }
              </select>
            </div>

            <div class="col-12">
              <label class="form-label"> Description </label>

              <textarea rows="5" class="form-control" placeholder="Project Description"></textarea>
            </div>

            <div class="col-md-6">
              <label class="form-label"> Project Manager </label>

              <select class="form-select">
                @for (item of userData(); track item.id) {
                  <option>{{ `${item.firstName}  ${item.lastName}` }}</option>
                }
              </select>
            </div>

            <div class="col-md-6">
              <label class="form-label"> Status </label>

              <select class="form-select">
                <option>Planning</option>

                <option>Active</option>

                <option>Completed</option>
              </select>
            </div>

            <div class="col-md-6">
              <label class="form-label"> Start Date </label>

              <input type="date" class="form-control" />
            </div>

            <div class="col-md-6">
              <label class="form-label"> End Date </label>

              <input type="date" class="form-control" />
            </div>
          </div>
        </div>

        <div class="card-footer bg-white d-flex justify-content-end gap-2">
          <button class="btn btn-outline-secondary">Cancel</button>

          <button class="btn btn-outline-warning">Reset</button>

          <button class="btn btn-primary">Save Project</button>
        </div>
      </div>
    </div>
  </div>
</div>
