<div class="container-fluid py-4">

    <!-- Header -->
    <div class="page-header d-flex justify-content-between align-items-center mb-4">

        <div>
            <h2 class="fw-bold mb-1">Users</h2>
            <p class="text-muted mb-0">
                Manage all system users and their roles.
            </p>
        </div>

        <button routerLink="/admin/user/add" class="btn btn-primary">
            <i class="bi bi-person-plus me-2"></i>
            Add User
        </button>

    </div>

    <!-- Filters -->
    <div class="card border-0 shadow-sm mb-4">

        <div class="card-body">

            <div class="row g-3">

                <div class="col-lg-5">

                    <div class="input-group">

                        <span class="input-group-text bg-white">
                            <i class="bi bi-search"></i>
                        </span>

                        <input type="text" class="form-control" placeholder="Search users">

                    </div>

                </div>

                <div class="col-lg-3">

                    <select class="form-select">

                        <option>All Roles</option>
                        <option>Admin</option>
                        <option>Project Manager</option>
                        <option>Employee</option>

                    </select>

                </div>

                <div class="col-lg-3">

                    <select class="form-select">

                        <option>All Status</option>
                        <option>Active</option>
                        <option>Inactive</option>

                    </select>

                </div>

                <div class="col-lg-1">

                    <button class="btn btn-outline-secondary w-100">
                        <i class="bi bi-arrow-clockwise"></i>
                    </button>

                </div>

            </div>

        </div>

    </div>

    <!-- Table -->
    <div class="card border-0 shadow-sm">

        <div class="card-body p-0">

            <div class="table-responsive">

                <table class="table align-middle mb-0">

                    <thead class="table-light">

                        <tr>

                            <th>Name</th>

                            <th>Email</th>

                            <th>Role</th>

                            <th>Department</th>

                            <th>Status</th>

                            <th class="text-center">Actions</th>

                        </tr>

                    </thead>

                    <tbody>

                        <tr>

                            <td>

                                <div class="d-flex align-items-center gap-2">

                                    <img src="https://i.pravatar.cc/40" class="rounded-circle">

                                    <strong>John Doe</strong>

                                </div>

                            </td>

                            <td>john@example.com</td>

                            <td><span class="badge bg-dark">Admin</span></td>

                            <td>IT</td>

                            <td><span class="badge bg-success">Active</span></td>

                            <td class="text-center">

                                <button class="btn btn-sm btn-light">
                                    <i class="bi bi-eye"></i>
                                </button>

                                <button class="btn btn-sm btn-warning mx-1">
                                    <i class="bi bi-pencil"></i>
                                </button>

                                <button class="btn btn-sm btn-danger">
                                    <i class="bi bi-trash"></i>
                                </button>

                            </td>

                        </tr>

                        <tr>

                            <td>

                                <div class="d-flex align-items-center gap-2">

                                    <img src="https://i.pravatar.cc/41" class="rounded-circle">

                                    <strong>Sara Khan</strong>

                                </div>

                            </td>

                            <td>sara@example.com</td>

                            <td><span class="badge bg-primary">Employee</span></td>

                            <td>HR</td>

                            <td><span class="badge bg-success">Active</span></td>

                            <td class="text-center">

                                <button class="btn btn-sm btn-light">
                                    <i class="bi bi-eye"></i>
                                </button>

                                <button class="btn btn-sm btn-warning mx-1">
                                    <i class="bi bi-pencil"></i>
                                </button>

                                <button class="btn btn-sm btn-danger">
                                    <i class="bi bi-trash"></i>
                                </button>

                            </td>

                        </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>
