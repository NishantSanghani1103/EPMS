<div class="container-fluid py-4">
  <!-- Header -->
  <div class="mb-4">
    <h2 class="fw-bold">Add User</h2>

    <p class="text-muted">Create a new system user with role-based access.</p>
  </div>

  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card shadow-sm border-0">
        <form [formGroup]="userForm" (ngSubmit)="userAdd()">
          <div class="card-body p-4">
            <div class="row g-3">
              <!-- First Name -->
              <div class="col-md-6">
                <label class="form-label">First Name</label>

                <input
                  type="text"
                  class="form-control"
                  placeholder="John"
                  formControlName="firstName"
                />

                <app-form-validation [control]="f['firstName']" label="First Name">
                </app-form-validation>
              </div>

              <!-- Last Name -->
              <div class="col-md-6">
                <label class="form-label">Last Name</label>

                <input
                  type="text"
                  class="form-control"
                  placeholder="Doe"
                  formControlName="lastName"
                />

                <app-form-validation [control]="f['lastName']" label="Last Name">
                </app-form-validation>
              </div>

              <!-- Email -->
              <div class="col-md-6">
                <label class="form-label">Email</label>

                <input
                  type="email"
                  class="form-control"
                  placeholder="john@example.com"
                  formControlName="email"
                />

                <app-form-validation [control]="f['email']" label="Email"> </app-form-validation>
              </div>

              <!-- Phone -->
              <div class="col-md-6">
                <label class="form-label">Phone</label>

                <input
                  type="text"
                  class="form-control"
                  placeholder="9876543210"
                  formControlName="phone"
                />

                <app-form-validation [control]="f['phone']" label="Phone"> </app-form-validation>
              </div>

              <!-- Role -->
              <div class="col-md-6">
                <label class="form-label">Role</label>

                <select class="form-select" formControlName="role">
                  <option value="admin">Admin</option>
                  <option value="manager">Project Manager</option>
                  <option value="employee">Employee</option>
                </select>

                <app-form-validation [control]="f['role']" label="Role"> </app-form-validation>
              </div>

              <!-- Department -->
              <div class="col-md-6">
                <label class="form-label">Department</label>

                <select class="form-select" formControlName="departmentId">
                  <option value="">--Select Department--</option>

                  @for (item of deptData(); track item.id) {
                    <option [value]="item.id">
                      {{ item.name }}
                    </option>
                  }
                </select>

                <app-form-validation [control]="f['departmentId']" label="Department">
                </app-form-validation>
              </div>

              <!-- Password -->
              <div class="col-md-6">
                <label class="form-label">Password</label>

                <input type="password" class="form-control" formControlName="password" />

                <app-form-validation [control]="f['password']" label="Password">
                </app-form-validation>
              </div>

              <!-- Confirm Password -->
              <div class="col-md-6">
                <label class="form-label">Confirm Password</label>

                <input type="password" class="form-control" formControlName="confirmPassword" />

                <app-form-validation [control]="f['confirmPassword']" label="Confirm Password">
                </app-form-validation>
              </div>
            </div>
          </div>

          <div class="card-footer bg-white d-flex justify-content-end gap-2 p-3">
            <button routerLink="/admin/user/view" type="button" class="btn btn-outline-secondary">
              Cancel
            </button>

            <button type="button" class="btn btn-outline-warning" (click)="userForm.reset()">
              Reset
            </button>

            <button type="submit" class="btn btn-primary" [disabled]="userForm.invalid">
              {{ deptId() ? 'Update' : 'Save' }} User
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
