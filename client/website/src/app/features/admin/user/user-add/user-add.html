<div class="container-fluid py-4">
  <!-- Header -->
  <div class="mb-4">
    <h2 class="fw-bold">Add User</h2>

    <p class="text-muted">Create a new system user with role-based access.</p>
  </div>

  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card shadow-sm border-0">
        <div class="card-body p-4">
          <form>
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">First Name</label>

                <input type="text" class="form-control" placeholder="John" />
              </div>

              <div class="col-md-6">
                <label class="form-label">Last Name</label>

                <input type="text" class="form-control" placeholder="Doe" />
              </div>

              <div class="col-md-6">
                <label class="form-label">Email</label>

                <input type="email" class="form-control" placeholder="john@example.com" />
              </div>

              <div class="col-md-6">
                <label class="form-label">Phone</label>

                <input type="text" class="form-control" placeholder="9876543210" />
              </div>

              <div class="col-md-6">
                <label class="form-label">Role</label>

                <select class="form-select">
                  <option>Admin</option>
                  <option>Project Manager</option>
                  <option>Employee</option>
                </select>
              </div>

              <div class="col-md-6">
                <label class="form-label">Department</label>

                <select class="form-select">
                    <option value="">--Select Department--</option>
                  @for (item of deptData(); track item.id) {
                    <option [value]="item.id">{{ item.name }}</option>
                  }
                </select>
              </div>

              <div class="col-md-6">
                <label class="form-label">Password</label>

                <input type="password" class="form-control" />
              </div>

              <div class="col-md-6">
                <label class="form-label">Confirm Password</label>

                <input type="password" class="form-control" />
              </div>
            </div>
          </form>
        </div>

        <div class="card-footer bg-white d-flex justify-content-end gap-2 p-3">
          <button class="btn btn-outline-secondary">Cancel</button>

          <button class="btn btn-outline-warning">Reset</button>

          <button class="btn btn-primary">Save User</button>
        </div>
      </div>
    </div>
  </div>
</div>
