<div class="admin-layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo">
      <i class="bi bi-kanban-fill"></i>
      <span>EPMS</span>
    </div>

    <ul class="menu">
      <li [class.active]="router.url === '/admin/dashboard'">
        <a routerLink="/admin/dashboard">
          <i class="bi bi-grid-fill"></i>
          <span>Dashboard</span>
        </a>
      </li>

      <li [class.active]="router.url.startsWith('/admin/department')">
        <a routerLink="/admin/department/view">
          <i class="bi bi-building"></i>
          <span>Departments</span>
        </a>
      </li>

      <li [class.active]="router.url.startsWith('/admin/user')">
        <a routerLink="/admin/user/view">
          <i class="bi bi-people-fill"></i>
          <span>Users</span>
        </a>
      </li>

      <li [class.active]="router.url.startsWith('/admin/project')">
        <a routerLink="/admin/project/view">
          <i class="bi bi-kanban"></i>
          <span>Projects</span>
        </a>
      </li>

      <li>
        <a href="javascript:void(0)">
          <i class="bi bi-bar-chart-line"></i>
          <span>Reports</span>
        </a>
      </li>

      <li>
        <a href="javascript:void(0)">
          <i class="bi bi-gear"></i>
          <span>Settings</span>
        </a>
      </li>
    </ul>

    <div class="sidebar-footer">
      <img src="https://i.pravatar.cc/60" class="profile" alt="Profile" />

      <div>
        <h6>Admin</h6>
        <small>Administrator</small>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="main-content">
    <header class="topbar">
      <div class="search-box">
        <i class="bi bi-search"></i>
        <input type="text" placeholder="Search..." />
      </div>

      <div class="top-actions">
        <button class="icon-btn">
          <i class="bi bi-bell"></i>
          <span class="badge">3</span>
        </button>

        <button class="icon-btn">
          <i class="bi bi-envelope"></i>
          <span class="badge">5</span>
        </button>

        <img src="https://i.pravatar.cc/45" class="user-image" alt="User" />
      </div>
    </header>

    <main class="page-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
