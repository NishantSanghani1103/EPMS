<div class="container-fluid py-4">
  <!-- Back Button -->
  <div class="mb-4">
    <button class="btn btn-outline-secondary">
      <i class="bi bi-arrow-left me-2"></i>
      Back to My Projects
    </button>
  </div>

  <!-- Project Header -->
  <div class="project-header">
    <div class="row align-items-center">
      <div class="col-lg-8">
        <div class="d-flex align-items-center">
          <div class="project-icon me-3">
            <i class="bi bi-kanban-fill"></i>
          </div>

          <div>
            <h2 class="mb-1 fw-bold">ERP Management System</h2>
            <p class="mb-0">Enterprise Resource Planning System for company operations.</p>
          </div>
        </div>
      </div>

      <div class="col-lg-4 text-lg-end mt-3 mt-lg-0">
        <span class="badge bg-success px-4 py-2"> Active </span>
      </div>
    </div>

    <!-- Progress -->

    <div class="mt-4">
      <div class="d-flex justify-content-between mb-2">
        <strong>Project Progress</strong>

        <strong>76%</strong>
      </div>

      <div class="progress">
        <div class="progress-bar bg-warning" style="width: 76%"></div>
      </div>
    </div>

    <!-- Information -->

    <div class="row mt-4">
      <div class="col-lg-2 col-md-4 col-6 mb-3">
        <div class="info-card">
          <i class="bi bi-person-circle"></i>

          <small>Manager</small>

          <h6>John Doe</h6>
        </div>
      </div>

      <div class="col-lg-2 col-md-4 col-6 mb-3">
        <div class="info-card">
          <i class="bi bi-building"></i>

          <small>Department</small>

          <h6>IT</h6>
        </div>
      </div>

      <div class="col-lg-2 col-md-4 col-6 mb-3">
        <div class="info-card">
          <i class="bi bi-people-fill"></i>

          <small>Members</small>

          <h6>08</h6>
        </div>
      </div>

      <div class="col-lg-2 col-md-4 col-6 mb-3">
        <div class="info-card">
          <i class="bi bi-list-task"></i>

          <small>Tasks</small>

          <h6>32</h6>
        </div>
      </div>

      <div class="col-lg-2 col-md-4 col-6 mb-3">
        <div class="info-card">
          <i class="bi bi-calendar-event"></i>

          <small>Start Date</small>

          <h6>01 Jan 2026</h6>
        </div>
      </div>

      <div class="col-lg-2 col-md-4 col-6 mb-3">
        <div class="info-card">
          <i class="bi bi-calendar-check"></i>

          <small>Due Date</small>

          <h6>30 Jun 2026</h6>
        </div>
      </div>
    </div>
  </div>

  <!-- Navigation -->

  <div class="workspace-tabs mt-4">
    <ul class="nav nav-pills">
      <li style="cursor: pointer" class="nav-item">
        <a class="nav-link active text-white">
          <i class="bi bi-grid me-2"></i>
          Overview
        </a>
      </li>

      <li class="nav-item">
        <a
          class="nav-link"
          [routerLink]="['/manager', 'project-workSpace', projectId(), 'member', 'add']"
        >
          <i class="bi bi-people me-2"></i>
          Members
        </a>
      </li>

      <li class="nav-item">
        <a class="nav-link">
          <i class="bi bi-list-task me-2"></i>
          Tasks
        </a>
      </li>

      <li class="nav-item">
        <a class="nav-link">
          <i class="bi bi-folder me-2"></i>
          Files
        </a>
      </li>

      <li class="nav-item">
        <a class="nav-link">
          <i class="bi bi-clock-history me-2"></i>
          Activity
        </a>
      </li>
    </ul>
  </div>

  <!-- Content Area -->

  <!-- <div class="workspace-body">
    <div class="text-center py-5">
      <i class="bi bi-layout-text-window display-3 text-primary"></i>

      <h3 class="mt-3">Project Overview</h3>

      <p class="text-muted mb-0">
        Overview, Members, Tasks, Files and Activity components will load here.
      </p>
    </div>
  </div> -->
  <router-outlet></router-outlet>
</div>
