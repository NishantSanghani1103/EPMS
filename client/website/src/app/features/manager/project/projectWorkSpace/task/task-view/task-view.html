<!-- Filters -->

<div class="card my-5 shadow-sm border-0 mb-4">
  <div class="card-body">
    <div class="row g-3">
      <div class="col-lg-4">
        <div class="input-group">
          <span class="input-group-text">
            <i class="bi bi-search"></i>
          </span>

          <input class="form-control" placeholder="Search task" />
        </div>
      </div>

      <div class="col-lg-3">
        <select class="form-select">
          <option>Status</option>
          <option>Pending</option>
          <option>In Progress</option>
          <option>Completed</option>
        </select>
      </div>

      <div class="col-lg-2">
        <select class="form-select">
          <option>Priority</option>
          <option>High</option>
          <option>Medium</option>
          <option>Low</option>
        </select>
      </div>

      <div class="col-lg-3">
        <select class="form-select">
          <option>Assignee</option>
          <option>Alex Johnson</option>
          <option>Sarah Smith</option>
          <option>David Miller</option>
        </select>
      </div>
    </div>
  </div>
</div>

<!-- Task Table -->

<div class="card shadow-sm border-0">
  <div class="table-responsive">
    <table class="table align-middle table-hover mb-0">
      <thead class="table-light">
        <tr>
          <th>Task</th>

          <th>Assigned To</th>

          <th>Priority</th>

          <th>Status</th>

          <th>Due Date</th>

          <th class="text-center">Action</th>
        </tr>
      </thead>

      <tbody>
        @for (item of taskData(); track item.id) {
          <tr>
            <td>
              <strong class="text-capitalize"> {{ item.title }} </strong>
            </td>

            <td>
              <div class="d-flex align-items-center">
                <img [src]="item.user.profileImageUrl" class="avatar me-2" />

                {{ item.user.firstName }}
              </div>
            </td>

            <td>
              <span
                class="badge text-capitalize"
                [ngClass]="{
                  'bg-success': item.priority === 'low',
                  'bg-warning text-dark': item.priority === 'medium',
                  'bg-danger': item.priority === 'high',
                }"
              >
                {{ item.priority }}
              </span>
            </td>
            <td>
              <span
                class="badge text-capitalize"
                [ngClass]="{
                  'bg-secondary': item.status === 'todo',
                  'bg-primary': item.status === 'in_progress',
                  'bg-success': item.status === 'completed',
              
                }"
              >
                {{ item.status }}
              </span>
            </td>

            <td>{{item.dueDate | date}}</td>

            <td class="text-center">
              <button class="btn btn-sm btn-outline-primary me-2">
                <i class="bi bi-eye"></i>
              </button>

              <button class="btn btn-sm btn-outline-success me-2">
                <i class="bi bi-pencil"></i>
              </button>

              <button class="btn btn-sm btn-outline-danger">
                <i class="bi bi-trash"></i>
              </button>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
