<div class="d-flex mt-5 justify-content-end align-items-center mb-4">
  <button class="btn btn-primary">
    <i class="bi bi-person-plus-fill me-2"></i>
    Add Member
  </button>
</div>

<!-- Filters -->

<div class="card border-0 shadow-sm mb-4">
  <div class="card-body">
    <div class="row g-3">
      <div class="col-lg-6">
        <div class="input-group">
          <span class="input-group-text">
            <i class="bi bi-search"></i>
          </span>

          <input class="form-control" placeholder="Search member" />
        </div>
      </div>

      <div class="col-lg-3">
        <select class="form-select">
          <option>Department</option>
          <option>IT</option>
          <option>HR</option>
          <option>Finance</option>
        </select>
      </div>

      <div class="col-lg-3">
        <select class="form-select">
          <option>Status</option>
          <option>Active</option>
          <option>Inactive</option>
        </select>
      </div>
    </div>
  </div>
</div>

<!-- Members Table -->

<div class="card border-0 shadow-sm">
  <div class="table-responsive">
    <table class="table table-hover align-middle mb-0">
      <thead class="table-light">
        <tr>
          <th>Employee</th>



          <th>Joined</th>

          <th>Status</th>

          <th class="text-center">Action</th>
        </tr>
      </thead>

      <tbody>
        @for (item of projectMemberData(); track item.id) {
          <tr>
            <td>
              <div class="d-flex align-items-center">
                <img [src]="item.user.profileImageUrl" class="avatar me-3" />

                <div>
                  <strong class="text-capitalize">{{ item.user.firstName}}  {{item.user.lastName}}</strong>

                  <br />

                  <small class="text-muted"> {{item.user.email}}</small>
                </div>
              </div>
            </td>

     

            <td>{{item.joinedAt | date}}</td>

            <td>
              <span class="badge bg-success text-capitalize"> {{item.user.status}} </span>
            </td>

            <td class="text-center">
              <button class="btn btn-sm btn-outline-primary me-2">
                <i class="bi bi-eye"></i>
              </button>

              <button class="btn btn-sm btn-outline-danger">
                <i class="bi bi-person-dash-fill"></i>
              </button>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
